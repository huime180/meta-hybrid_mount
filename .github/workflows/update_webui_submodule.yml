name: Update WebUI Submodule

on:
  repository_dispatch:
    types:
      - webui-updated
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: update-webui-dev
  cancel-in-progress: false

jobs:
  update-webui:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: dev
          fetch-depth: 0
          submodules: recursive

      - name: Show trigger context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "source_repository=${{ github.event.client_payload.source_repository }}"
            echo "source_branch=${{ github.event.client_payload.source_branch }}"
            echo "source_sha=${{ github.event.client_payload.source_sha }}"
          fi

      - name: Resolve tracked branch
        id: tracked_branch
        run: |
          TRACKED_BRANCH=$(git config -f .gitmodules submodule.webui.branch || echo main)
          echo "tracked_branch=${TRACKED_BRANCH}" >> "${GITHUB_OUTPUT}"
          echo "Tracked branch: ${TRACKED_BRANCH}"
          SHOULD_UPDATE=true
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]] && [[ -n "${{ github.event.client_payload.source_branch }}" ]] && [[ "${{ github.event.client_payload.source_branch }}" != "${TRACKED_BRANCH}" ]]; then
            SHOULD_UPDATE=false
            echo "Ignoring repository_dispatch from branch '${{ github.event.client_payload.source_branch }}'"
            echo "This workflow only tracks '${TRACKED_BRANCH}'."
          fi
          echo "should_update=${SHOULD_UPDATE}" >> "${GITHUB_OUTPUT}"

      - name: Update webui submodule
        if: ${{ steps.tracked_branch.outputs.should_update == 'true' }}
        run: |
          git submodule sync -- webui
          TRACKED_BRANCH="${{ steps.tracked_branch.outputs.tracked_branch }}"
          git submodule set-branch --branch "${TRACKED_BRANCH}" webui
          git -C webui fetch origin "${TRACKED_BRANCH}"
          git -C webui checkout -B "${TRACKED_BRANCH}" "origin/${TRACKED_BRANCH}"

      - name: Commit and push if changed
        if: ${{ steps.tracked_branch.outputs.should_update == 'true' }}
        env:
          TARGET_TOKEN: ${{ secrets.META_HYBRID_MOUNT_REPO_TOKEN }}
        run: |
          if git diff --quiet -- webui; then
            echo "No webui submodule updates"
            exit 0
          fi

          if [[ -z "${TARGET_TOKEN}" ]]; then
            echo "META_HYBRID_MOUNT_REPO_TOKEN is required so the push to dev can trigger CI."
            exit 1
          fi

          WEBUI_SHA=$(git -C webui rev-parse --short=12 HEAD)

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${TARGET_TOKEN}@github.com/${{ github.repository }}.git"

          git add webui
          git commit -m "chore(submodule): update webui to ${WEBUI_SHA}"
          git push origin HEAD:dev
