name: Release Hybrid-Mount

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-hymofs-lkm:
    uses: ./.github/workflows/build-hymofs-lkm.yml
    secrets: inherit

  release:
    needs: build-hymofs-lkm
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download HymoFS LKM artifacts
        uses: actions/download-artifact@v4
        with:
          path: hymofs_lkm_artifacts
          pattern: '*-hymofs-lkm'
          merge-multiple: true

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
          components: rust-src, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: webui/pnpm-lock.yaml

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y gcc-multilib
          cargo install cargo-ndk --locked

      - name: Prepare APatch KPM Sources
        run: |
          git clone --depth 1 https://github.com/AndroidPatch/kpm.git /tmp/apatch-kpm

      - name: Build Release Package
        env:
          HYBRID_MOUNT_SIGN_KEY: ${{ secrets.SIGNING_KEY }}
          HYBRID_MOUNT_SIGN_CERT: ${{ secrets.SIGNING_CERT }}
          HYBRID_MOUNT_KP_DIR: /tmp/apatch-kpm
          HYBRID_MOUNT_HYMOFS_LKM_DIR: ${{ github.workspace }}/hymofs_lkm_artifacts
          HYBRID_MOUNT_NOTIFY: "1"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          export ANDROID_NDK_LATEST_HOME="${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_ROOT}"
          cargo xtask build --release --tag ${{ github.ref_name }}

      - name: Prepare Release Metadata
        id: meta
        run: |
          ZIP_FILE=$(cd output && ls *.zip | head -n 1)
          ZIP_NAME=$(basename "$ZIP_FILE")
          REPO="${{ github.repository }}"
          TAG="${{ github.ref_name }}"
          
          CLEAN_VERSION="${TAG#v}"
          VERSION_CODE=$(echo $CLEAN_VERSION | awk -F. '{printf "%d%02d%02d", $1, $2, $3}')
          
          echo "ZIP_PATH=output/$ZIP_NAME" >> $GITHUB_ENV
          
          DOWNLOAD_URL="https://github.com/$REPO/releases/download/$TAG/$ZIP_NAME"
          CHANGELOG_URL="https://raw.githubusercontent.com/$REPO/master/changelog.md"
          
          cat <<EOF > /tmp/update.json
          {
            "version": "$TAG",
            "versionCode": $VERSION_CODE,
            "zipUrl": "$DOWNLOAD_URL",
            "changelog": "$CHANGELOG_URL"
          }
          EOF

      - name: Generate Changelog
        id: git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --current
          github_token: ${{ github.token }}
        env:
          OUTPUT: /tmp/changelog.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create Release (Local)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: false
          prerelease: false
          files: ${{ env.ZIP_PATH }}
          body_path: /tmp/changelog.md
          
      - name: Create Remote Release (KernelSU-Repo)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          repository: KernelSU-Modules-Repo/hybrid_mount
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: ${{ env.ZIP_PATH }}
          body_path: /tmp/changelog.md

      - name: Sync Version to Master
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git fetch origin master
          git checkout master
          
          mv /tmp/update.json update.json
          cat /tmp/changelog.md | cat - changelog.md > temp && mv temp changelog.md

          cargo update
          
          git add update.json changelog.md Cargo.toml Cargo.lock
          
          if ! git diff --staged --quiet; then
            git commit -m "chore(release): sync version ${{ github.ref_name }} [skip ci]"
            git push origin master
          fi
