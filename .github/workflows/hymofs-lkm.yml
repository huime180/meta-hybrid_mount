name: Build HymoFS Kernel Module

on:
  workflow_call:
    inputs:
      kmi:
        description: "KMI version"
        required: true
        type: string
      arch:
        description: "Target architecture (DDK currently supports arm64 only)"
        required: true
        type: string
      hymofs_ref:
        description: "HymoFS git ref (branch/tag/commit)"
        required: false
        default: "main"
        type: string
      ddk_release:
        description: "DDK release version"
        required: false
        default: "20251104"
        type: string

jobs:
  build:
    name: Build hymofs ${{ inputs.arch }} ${{ inputs.kmi }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ylarod/ddk:${{ inputs.kmi }}-${{ inputs.ddk_release }}
      options: --privileged
    env:
      KMI: ${{ inputs.kmi }}
      TARGET_ARCH: ${{ inputs.arch }}
      OUT: ${{ github.workspace }}/out
      SRC_ROOT: ${{ github.workspace }}/hymofs_src
      SRC: ${{ github.workspace }}/hymofs_src/src

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate target arch
        run: |
          if [ "$TARGET_ARCH" != "arm64" ]; then
            echo "DDK workflow currently supports arm64 only, got: $TARGET_ARCH"
            exit 1
          fi

      - name: Clone HymoFS
        run: |
          set -euo pipefail
          echo "Cloning HymoFS (ref: ${{ inputs.hymofs_ref }})..."
          git clone --depth 1 "https://github.com/Anatdx/HymoFS.git" "$SRC_ROOT"
          (
            cd "$SRC_ROOT"
            git fetch --depth 1 origin "${{ inputs.hymofs_ref }}"
            git checkout FETCH_HEAD
          )
          ls -la "$SRC/"

      - name: Generate version
        id: parse_version
        run: |
          COMMIT_NUM=$(cd "$SRC_ROOT" && git rev-list --count HEAD)
          VERSION=$((COMMIT_NUM + 200))
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build hymofs_lkm.ko
        run: |
          set -euo pipefail
          if [ -z "${KDIR:-}" ] || [ ! -f "$KDIR/Makefile" ]; then
            echo "KDIR is not available inside DDK container: ${KDIR:-<empty>}"
            exit 1
          fi

          VERSION="${{ steps.parse_version.outputs.VERSION }}"
          echo "Building hymofs_lkm.ko with KDIR=$KDIR"
          (
            cd "$SRC_ROOT"
            make -j"$(nproc --all)" CC=clang \
              CFLAGS_MODULE="-DHYMOFS_VERSION=\\\"0.1.${VERSION}\\\""
          )

          mkdir -p "$OUT"
          KO_FILE="${KMI}_${TARGET_ARCH}_hymofs_lkm.ko"
          cp "$SRC/hymofs_lkm.ko" "$OUT/$KO_FILE"
          llvm-strip -d "$OUT/$KO_FILE" 2>/dev/null || true
          ls -la "$OUT/"

      - name: Upload .ko
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.KMI }}-${{ env.TARGET_ARCH }}-hymofs-lkm
          path: ${{ env.OUT }}/${{ env.KMI }}_${{ env.TARGET_ARCH }}_hymofs_lkm.ko
