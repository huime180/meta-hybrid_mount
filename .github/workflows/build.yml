name: Build Hybrid-Mount

on:
  push:
    branches:
      - 'dev'
    paths:
      - 'src/**'
      - 'Cargo.*'
      - 'module/**'
      - 'webui'
      - 'webui/**'
      - 'xtask/**'
      - 'build.rs'
      - 'scripts/build-local.sh'
      - '.github/workflows/build-hymofs-lkm.yml'
      - '.github/workflows/hymofs-lkm.yml'
      - '.github/workflows/build.yml'
  pull_request:
    branches:
      - 'dev'
    paths:
      - 'src/**'
      - 'Cargo.*'
      - 'module/**'
      - 'webui'
      - 'webui/**'
      - 'xtask/**'
      - 'build.rs'
      - 'scripts/build-local.sh'
      - '.github/workflows/build-hymofs-lkm.yml'
      - '.github/workflows/hymofs-lkm.yml'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      include_hymofs_lkm:
        description: "Also build and stage HymoFS LKM artifacts"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-hymofs-lkm:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.include_hymofs_lkm }}
    uses: ./.github/workflows/build-hymofs-lkm.yml
    secrets: inherit

  build:
    needs:
      - build-hymofs-lkm
    if: ${{ always() && (needs.build-hymofs-lkm.result == 'success' || needs.build-hymofs-lkm.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Checkout KPM Sources
        uses: actions/checkout@v6
        with:
          repository: Hybrid-Mount/nuke-kpm
          path: nuke-kpm
          fetch-depth: 1

      - name: Download HymoFS LKM artifacts
        if: ${{ needs.build-hymofs-lkm.result == 'success' }}
        uses: actions/download-artifact@v8
        with:
          path: hymofs_lkm_artifacts
          pattern: "*-hymofs-lkm"
          merge-multiple: true

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-linux-android
          components: rust-src, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "10"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: webui/pnpm-lock.yaml

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y gcc-multilib
          cargo install cargo-ndk --locked

      - name: Prepare APatch KPM Sources
        run: |
          git clone --depth 1 https://github.com/AndroidPatch/kpm.git /tmp/apatch-kpm

      - name: Build All
        env:
          HYBRID_MOUNT_KPM_DIR: ${{ github.workspace }}/nuke-kpm
          HYBRID_MOUNT_KP_DIR: /tmp/apatch-kpm
          HYBRID_MOUNT_NOTIFY: ${{ github.event_name != 'pull_request' && '1' || '0' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          export ANDROID_NDK_LATEST_HOME="${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_ROOT}"
          if [ -d "${GITHUB_WORKSPACE}/hymofs_lkm_artifacts" ] && find "${GITHUB_WORKSPACE}/hymofs_lkm_artifacts" -type f -name '*.ko' | grep -q .; then
            export HYBRID_MOUNT_HYMOFS_LKM_DIR="${GITHUB_WORKSPACE}/hymofs_lkm_artifacts"
            ls -la "$HYBRID_MOUNT_HYMOFS_LKM_DIR"
          else
            echo "Skipping HymoFS LKM staging for regular CI build"
          fi
          cargo xtask build --ci

      - name: Detect Version and Name
        run: |
          ZIP_PATH=$(ls output/*.zip | head -n 1)
          ZIP_FILENAME=$(basename "$ZIP_PATH")
          ARTIFACT_NAME="${ZIP_FILENAME%.*}"
          VERSION="${ARTIFACT_NAME#Hybrid-Mount-}"
          
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_ENV
          echo "BUILD_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Prepare Artifact
        run: |
          mkdir -p output/artifact_content
          unzip output/*.zip -d output/artifact_content
          rm output/*.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: output/artifact_content
